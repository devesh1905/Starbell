name: Deploy to GitHub Pages

permissions:
  contents: read
  pages: write
  actions: read
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages target
        uses: actions/configure-pages@v4

      - name: Upload site contents
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs
          artifact-name: github-pages-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact-name: github-pages-${{ github.run_id }}

      - name: Verify deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = await github.rest.pages.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            core.notice(`Pages site status: ${status.data.status}`);
            core.notice(`Pages url: ${status.data.html_url}`);

